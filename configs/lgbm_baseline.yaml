data:
  comp: "playground-series-s6e6"
  target: "class"
  id_col: "id"
  objective: "multiclass"
  metric: "logloss"

model:
  name: "lgbm"
  params:
    num_leaves: 158
    min_child_samples: 40
    learning_rate: 0.042387
    feature_fraction: 0.638674
    bagging_fraction: 0.980003
    lambda_l1: 1.918585
    lambda_l2: 1.0e-8

cv:
  n_folds: 5
  seed: 42

# seed 平均（full run のみ。smoke は cv.seed 単発）。空/未指定なら [cv.seed]。
seeds: [42, 777, 2026]

runtime:
  experiments_db: "data/experiments.db"
  output_root: "outputs/runs"
  num_boost_round: 2000
  early_stopping_rounds: 50
  smoke_max_folds: 1
  smoke_n_folds: 2
  smoke_num_boost_round: 20
