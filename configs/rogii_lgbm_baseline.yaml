data:
  comp: "rogii-wellbore-geology-prediction"
  target: "TVT"
  submission_target: "tvt"
  id_col: "id"
  objective: "regression"
  metric: "rmse"
  # Local bootstrap guardrail. Remove or raise for full Vertex training.
  train_row_limit: 200000

model:
  name: "lgbm"
  params:
    num_leaves: 127
    min_child_samples: 80
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    lambda_l1: 0.0
    lambda_l2: 1.0

cv:
  strategy: "group"
  group_col: "well_id"
  n_folds: 5
  seed: 42

seeds: [42, 777, 2026]

runtime:
  output_root: "outputs/runs"
  num_boost_round: 2000
  early_stopping_rounds: 80
  smoke_max_folds: 1
  smoke_n_folds: 2
  smoke_num_boost_round: 30
