# ===========================================
# Kaggle パイプライン設定
# コンペ切り替えは comp と下の4項目だけ変更する
# ===========================================

# --- コンペ識別子（パスに使用: data/<comp>/raw/ など）---
comp: "playground-series-s6e6"

# --- データセット ---
target: "class"             # 目的変数列名
id_col: "id"                # ID 列名（なければ null）
objective: "multiclass"     # regression / binary / multiclass
metric: "logloss"           # rmse / auc / logloss / mape

# --- 学習 ---
n_folds: 5
seed: 42

# --- パス（comp から自動導出。変更不要）---
experiments_db: "data/experiments.db"  # 全コンペ共通
