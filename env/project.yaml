# Project path/name source of truth.
#
# Edit this file after moving or renaming the project, then run:
#   make render-project-config

projectName: kaggle-bronze-gcp
repoRoot: /home/ubuntu/repos/kaggle-bronze-gcp
workspaceRoot: /home/ubuntu/repos
homeDir: /home/ubuntu

# GCP settings for Vertex-ready experiment runner.
# Fill these before running make train-vertex/build-push/collect.
gcp:
  project: mlops-dev-a
  account: kurokawa81toshifumi@gmail.com
  region: us-central1
gcpProject: mlops-dev-a
gcpAccount: kurokawa81toshifumi@gmail.com
gcpRegion: us-central1
artifactRegistryRepo: kaggle
imageName: kaggle-bronze-gcp
imageTag: latest
# Optional override. If empty, scripts derive:
# {gcpRegion}-docker.pkg.dev/{gcpProject}/{artifactRegistryRepo}/{imageName}:{imageTag}
imageUri:
gcsBucket: mlops-dev-a-kaggle-bronze-runs
# コスト概算ロガー（costs.py / kaggle_ops.cost_estimates）の円換算レート
bqDataset: kaggle_ops
jpyPerUsd: 150
# full run 向け（8物理コア, ローカル i7-8700 超）。smoke/EDA はローカルで回す。
# per-run を更に速くするなら c2-standard-16（高クロック）。GPU は bronze では不要。
vertexMachineType: n2-standard-16
vertexServiceAccount: kaggle-bronze-vertex@mlops-dev-a.iam.gserviceaccount.com
